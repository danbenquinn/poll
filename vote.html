<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAE 1425 · Vote</title>
<style>
  :root{ --bg:#0b0c0e; --ink:#f2f2ef; --muted:#9aa0a6; --accent:#6cc6ff; --card:#16181c; --ok:#5ad46a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
             font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-tap-highlight-color:transparent; }
  .wrap{ max-width:520px; margin:0 auto; padding:22px 18px 40px; min-height:100%; display:flex; flex-direction:column; }
  .kicker{ color:var(--accent); font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; }
  h1{ font-size:1.25rem; line-height:1.35; margin:.5em 0 .2em; font-weight:650; }
  button{ font:inherit; color:inherit; cursor:pointer; }
  .choice{ display:flex; align-items:center; gap:.7em; width:100%; text-align:left;
           background:var(--card); border:1.5px solid #2a2d33; border-radius:14px;
           padding:16px 16px; margin:0 0 12px; font-size:1.05rem; transition:border-color .15s, background .15s; }
  .choice .key{ flex:0 0 1.9em; height:1.9em; line-height:1.9em; text-align:center; border-radius:8px;
                background:#22252b; color:var(--muted); font-weight:650; }
  .choice.sel{ border-color:var(--accent); background:#12283a; }
  .choice.sel .key{ background:var(--accent); color:#04121d; }
  .choice[disabled]{ opacity:.55; }
  .status{ margin-top:8px; font-size:.95rem; color:var(--ok); min-height:1.4em; }
  .idbar{ margin-top:auto; padding-top:22px; color:var(--muted); font-size:.85rem; }
  .idbar a{ color:var(--accent); text-decoration:none; }
  .idscreen label{ display:block; margin:1.2em 0 .5em; color:var(--muted); }
  .idscreen input{ width:100%; padding:14px 14px; font-size:1.1rem; border-radius:12px;
                   border:1.5px solid #2a2d33; background:var(--card); color:var(--ink); }
  .idscreen .go{ width:100%; margin-top:16px; padding:15px; border-radius:12px; border:0;
                 background:var(--accent); color:#04121d; font-weight:700; font-size:1.05rem; }
  .hint{ color:var(--muted); font-size:.85rem; margin-top:.7em; line-height:1.4; }
  .err{ color:#ff9a9a; }
  .waiting{ margin:auto 0; text-align:center; color:var(--muted); }
  .waiting .dot{ display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--accent);
                 margin:0 3px; animation:pulse 1.2s infinite ease-in-out; }
  .waiting .dot:nth-child(2){ animation-delay:.2s } .waiting .dot:nth-child(3){ animation-delay:.4s }
  @keyframes pulse{ 0%,100%{opacity:.25} 50%{opacity:1} }
  .hidden{ display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">MAE 1425 · Applied Physics</div>

  <div id="idscreen" class="idscreen hidden">
    <h1>Before you vote</h1>
    <label for="cid">Your UVA Computing ID</label>
    <input id="cid" name="computing-id" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="e.g. abc1de" inputmode="text">
    <button class="go" id="idgo">Continue</button>
    <p class="hint">Used once to distribute prizes. Saved on this phone so you won't be asked again. It is not a password.</p>
    <p id="iderr" class="hint err"></p>
  </div>

  <div id="pollscreen" class="hidden">
    <h1 id="qtitle"></h1>
    <div id="choices"></div>
    <div id="status" class="status"></div>
    <div class="idbar">Voting as <b id="whoami"></b> · <a href="#" id="changeid">change</a></div>
  </div>

  <div id="waitscreen" class="hidden">
    <div class="waiting">
      <h1 id="waittitle">Waiting for the next question</h1>
      <p class="hint" id="waitbody">Keep this page open — it follows along with class.</p>
      <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>
    <div class="idbar">Voting as <b id="whoami2"></b> · <a href="#" id="changeid2">change</a></div>
  </div>

  <div id="msg" class="hidden"><h1 id="msgtitle"></h1><p id="msgbody" class="hint"></p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ---- Supabase project (same values as in the deck) ----
  const SUPABASE_URL = "https://rdbacwwbeyeqdkswwvjt.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IQNxMMynit0aWtOS3tjiRQ_h5sNo159";
  // --------------------------------------------------------

  // Question bank, keyed by poll id. Choice order MUST match the deck (A=0, B=1, ...).
  const POLLS = {
    "classB-q1": {
      q: "A ball dropped from height h takes time τ to land. Now it's thrown upward at speed h/τ. Time to land, compared to τ?",
      choices: ["Longer", "Shorter", "The same", "Depends on h"]
    },
    "classB-q2": {
      q: "How much longer, in terms of τ?  (hint: g = 2h/τ²)",
      choices: ["1.5 τ", "(1+√5)/2 · τ", "2 τ", "√2 · τ"]
    }
  };

  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const CLASS = params.get("class");
  const configured = !SUPABASE_URL.includes("YOUR-PROJECT");
  let supa = null;   // created below, only once we know the library actually loaded

  let state = { poll: null, open: false };   // pushed from the deck via get_state
  let shownKey = null;                        // what's currently rendered (poll|open)

  function show(el){ ["idscreen","pollscreen","waitscreen","msg"].forEach(i=>$(i).classList.add("hidden")); $(el).classList.remove("hidden"); }
  function message(t,b){ $("msgtitle").textContent=t; $("msgbody").textContent=b; show("msg"); }
  function getId(){ return (localStorage.getItem("uva_computing_id")||"").trim(); }
  function setWho(){ $("whoami").textContent=getId(); $("whoami2").textContent=getId(); }

  if(!CLASS){ message("Missing class", "This link is incomplete. Scan the code shown on the current slide."); }
  else if(!configured){ message("Not configured", "The voting backend isn't set up yet."); }
  else if(!window.supabase){ message("Couldn't load", "A network hiccup stopped the voter from loading. Check your connection and reload this page."); }
  else { supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); start(); }

  function start(){
    setWho();
    if(!getId()){ show("idscreen"); $("cid").focus(); return; }
    beginPolling();
  }

  $("idgo").addEventListener("click", () => {
    const v = $("cid").value.trim().toLowerCase();
    if(!/^[a-z]{2,4}[0-9]{0,4}[a-z]?$/i.test(v) || v.length < 3){
      $("iderr").textContent = "Please enter a valid UVA Computing ID (e.g. abc1de)."; return;
    }
    localStorage.setItem("uva_computing_id", v); setWho(); beginPolling();
  });
  function changeId(e){ e.preventDefault(); shownKey=null; show("idscreen"); $("cid").value=getId(); $("cid").focus(); }
  $("changeid").addEventListener("click", changeId);
  $("changeid2").addEventListener("click", changeId);

  let polling = false;
  function beginPolling(){
    reconcile();                       // show a screen IMMEDIATELY (no blank gap while the first poll loads)
    if(polling) return;
    polling = true; poll(); setInterval(poll, 2500);
  }

  async function poll(){
    try{
      const { data, error } = await supa.rpc("get_state", { p_class: CLASS });
      if(error) throw error;
      const row = (data && data[0]) || null;
      state = row ? { poll: row.current_poll, open: !!row.is_open } : { poll: null, open: false };
    }catch(e){ console.warn(e); }
    reconcile();
  }

  function reconcile(){
    if(!getId()) return;                       // still on id screen
    const key = (state.poll || "-") + "|" + state.open;
    if(key === shownKey) return;               // nothing changed
    shownKey = key;
    if(state.poll && POLLS[state.poll]) renderQuestion(state.poll, state.open);
    else showWait("Waiting for the next question", "Keep this page open — it follows along with class.");
  }

  function showWait(t,b){ $("waittitle").textContent=t; $("waitbody").textContent=b; show("waitscreen"); }

  function renderQuestion(pid, open){
    show("pollscreen");
    const poll = POLLS[pid];
    $("qtitle").textContent = poll.q;
    const prev = localStorage.getItem("voted_"+pid);
    const box = $("choices"); box.innerHTML = "";
    poll.choices.forEach((txt,i) => {
      const b = document.createElement("button");
      b.className = "choice" + (String(i)===prev ? " sel" : "");
      if(!open) b.setAttribute("disabled","");
      b.innerHTML = `<span class="key">${"ABCD"[i]}</span><span>${txt}</span>`;
      b.addEventListener("click", () => submit(pid, i));
      box.appendChild(b);
    });
    $("status").textContent = !open ? "Voting closed for this question." :
                              (prev!==null ? "Recorded. Tap another to change it (until voting closes)." : "");
  }

  async function submit(pid, i){
    if(!state.open || state.poll !== pid) return;
    [...document.querySelectorAll(".choice")].forEach((c,j)=>c.classList.toggle("sel", j===i));
    $("status").textContent = "Sending…";
    try{
      const { error } = await supa.rpc("cast_vote", { p_poll: pid, p_id: getId(), p_choice: i });
      if(error) throw error;
      localStorage.setItem("voted_"+pid, i);
      $("status").textContent = "Vote recorded ✓  You can change it until voting closes.";
    }catch(e){
      $("status").innerHTML = '<span class="err">Could not send — check your connection and tap again.</span>';
      console.warn(e);
    }
  }
</script>
</body>
</html>
